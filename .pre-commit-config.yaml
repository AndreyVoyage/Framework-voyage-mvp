repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check voyage_framework
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: python -m ruff format --check voyage_framework
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: python -m mypy voyage_framework
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
