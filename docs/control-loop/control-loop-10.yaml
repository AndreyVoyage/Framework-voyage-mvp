acceptance_criteria:
  - CONTROL-LOOP-10 contract defines a minimal controlled launcher.
  - CONTROL-LOOP-10A remains spec-only.
  - No launcher, runner, bridge, scheduler, or night mode is implemented or executed in 10A.
  - Contract requires explicit human approval before every future launcher run.
  - Contract requires single-shot execution only.
  - Contract forbids loops and second NEXT_ACTION creation.
  - Contract forbids push, merge, commit, deploy, .env reads, and .voyage writes.
  - Contract requires full hash verification and rejects synthetic hashes.
  - Contract defines STOP conditions for drift, dirty repos, malformed packages, missing approval, unexpected files, and forbidden actions.
  - Manual relay remains permanently available.
