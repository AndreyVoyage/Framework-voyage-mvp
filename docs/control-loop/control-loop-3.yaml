  - "tools/control_loop_handoff.ps1 exists, is PowerShell 5.1 compatible, pure ASCII, and read-only by default."
  - "Helper scripts do not edit files, stage, commit, push, read .env, touch .voyage, invoke Claude/Codex bridges, or execute tasks."
  - "Primary repo remains untouched; CONTROL-LOOP-3 changes are made only in the auto worktree."
  - "Handoff reports are specified as UTF-8 local files under docs/handoff/."
  - "Next action output is explicit and requires human approval before any executor task."
  - "No task execution and no bridge invocation are performed in this phase."
  - "No .env is read and no .voyage runtime files are modified."

